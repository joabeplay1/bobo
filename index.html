<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omega Factory ⚡</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <h1>Omega Factory</h1>
      <p>Gerador de Software com IA</p>
    </div>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    Online
  </div>
</header>

<div class="main">

  <aside class="sidebar">

    <div>
      <div class="section-label">⚙ Configuração</div>
      <div class="grid-2" style="margin-top:8px">
        <div>
          <label>Provedor</label>
          <select id="api-provider">
            <option value="gemini">Google Gemini</option>
            <option value="groq">Groq</option>
          </select>
        </div>
        <div>
          <label>Modelo</label>
          <select id="model-select"></select>
        </div>
      </div>
      <div style="margin-top:10px">
        <label>API Key</label>
        <div class="api-key-wrap">
          <input type="password" id="api-key" placeholder="Cole sua API Key aqui..." />
          <button class="eye-btn" id="eye-btn" title="Mostrar/ocultar">👁</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div style="display:flex;flex-direction:column;gap:10px;flex:1">
      <div class="section-label">✏ Prompt</div>
      <textarea id="prompt" placeholder="Descreva o que você quer criar...

Ex: Crie um app de lista de tarefas com design moderno, dark mode, drag & drop e localStorage..."></textarea>

      <div class="btn-row">
        <button class="btn-generate" id="generate-btn">
          <span>✨</span> Gerar Projeto
        </button>
        <button class="btn-stop hidden" id="stop-btn">
          ⏹ Parar
        </button>
      </div>
      <p class="hint">Ctrl+Enter para gerar</p>
    </div>

  </aside>

  <div class="panel">

    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('preview', this)">👁 Prévia</button>
      <button class="tab-btn" onclick="switchTab('code', this)">💻 Código</button>
    </div>

    <div class="content">

      <div class="tab-content active" id="tab-preview">
        <div class="preview-toolbar">
          <div class="window-dots">
            <span class="r"></span><span class="y"></span><span class="g"></span>
          </div>
          <div class="resp-btns">
            <button class="resp-btn active" data-view="desktop" title="Desktop">🖥</button>
            <button class="resp-btn" data-view="tablet" title="Tablet">📱</button>
            <button class="resp-btn" data-view="mobile" title="Mobile">📲</button>
          </div>
          <span style="font-size:10px;color:var(--muted);font-family:var(--mono)" id="view-label">100%</span>
        </div>
        <div class="preview-area">
          <div class="iframe-wrapper view-desktop" id="iframe-wrapper">
            <div class="preview-empty" id="preview-empty">
              <div class="icon">🖥</div>
              <p>A prévia aparecerá aqui</p>
            </div>
            <iframe id="output-frame" style="display:none"
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
              title="Preview"></iframe>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-code">
        <div class="code-toolbar">
          <span class="code-filename">index.html</span>
          <div class="code-actions">
            <button class="icon-btn" id="copy-btn" onclick="copyCode()" disabled title="Copiar">📋 Copiar</button>
            <button class="icon-btn" id="download-btn" onclick="downloadCode()" disabled title="Baixar">⬇ Baixar</button>
          </div>
        </div>
        <div class="code-area">
          <div class="code-empty" id="code-empty">Nenhum código gerado ainda</div>
          <pre id="code-output" style="display:none"></pre>
        </div>
      </div>

    </div>

    <div class="log-bar">
      <div class="log-header">⬛ Log</div>
      <div id="status-log"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
