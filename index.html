<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jesus Reina AI Studio ⚡</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">
      <h1>Jesus Reina AI Studio</h1>
      <p>Gerador de Software com IA</p>
    </div>
  </div>
  <div class="status-dot"><div class="dot"></div>Online</div>
</header>

<div class="main">
  <aside class="sidebar">
    <div>
      <div class="section-label">⚙ Configuração</div>
      <div class="grid-2" style="margin-top:8px">
        <div>
          <label>Provedor</label>
          <select id="api-provider">
            <option value="gemini">Google Gemini</option>
            <option value="groq">Groq</option>
          </select>
        </div>
        <div>
          <label>Modelo</label>
          <select id="model-select"></select>
        </div>
      </div>
      <div style="margin-top:10px">
        <label>API Key</label>
        <div class="api-key-wrap">
          <input type="password" id="api-key" placeholder="Cole sua API Key aqui..."/>
          <button class="eye-btn" id="eye-btn">👁</button>
        </div>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="ai-panel">
      <div class="ai-header" onclick="toggleAI()">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">
          🪄 IA Assistente <span style="font-size:10px;color:var(--muted);font-weight:400">otimizar & evoluir</span>
        </span>
        <span id="ai-chevron" style="color:var(--muted);font-size:11px">▲</span>
      </div>
      <div class="ai-body" id="ai-body">
        <div class="quick-grid">
          <button class="quick-btn" onclick="runImprovement('Melhore o design visual: cores, tipografia, espaçamentos e animações.')">🎨 Design</button>
          <button class="quick-btn" onclick="runImprovement('Torne o layout totalmente responsivo para mobile, tablet e desktop.')">📱 Responsivo</button>
          <button class="quick-btn" onclick="runImprovement('Analise e corrija bugs no código.')">✅ Bugs</button>
          <button class="quick-btn" onclick="runImprovement('Adicione Dark Mode.')">🌙 Dark Mode</button>
          <button class="quick-btn" onclick="runImprovement('Adicione persistência de dados com LocalStorage.')">💾 Dados</button>
          <button class="quick-btn" onclick="runImprovement('Otimize performance e adicione estados de carregamento.')">⚡ Performance</button>
        </div>
        <textarea id="improve-prompt" placeholder="Descreva uma melhoria..." style="min-height:60px;margin-top:4px"></textarea>
        <button class="btn-generate" id="improve-btn" onclick="runCustomImprovement()" style="padding:8px">🪄 Aplicar</button>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div>
      <div class="section-label" style="justify-content:space-between">
        <span>📁 Histórico</span>
        <button onclick="newProject()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px">＋</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
    
    <div class="divider"></div>
    
    <div style="display:flex;flex-direction:column;gap:10px;flex:1">
      <div class="section-label">✏ Prompt</div>
      <textarea id="prompt" placeholder="Descreva o software que deseja criar..."></textarea>
      <div class="btn-row">
        <button class="btn-generate" id="generate-btn"><span>✨</span> Gerar Projeto</button>
        <button class="btn-stop hidden" id="stop-btn">⏹ Parar</button>
      </div>
    </div>
  </aside>
  
  <div class="panel">
    <div class="tabs-bar">
      <div style="display:flex">
        <button class="tab-btn active" onclick="switchTab('preview',this)">👁 Prévia</button>
        <button class="tab-btn" onclick="switchTab('code',this)">💻 Código</button>
      </div>
      <div style="display:flex;gap:8px">
        <button id="edit-btn" onclick="toggleEdit()">✏ Editar Visual</button>
        <span id="edit-badge" class="edit-badge" style="display:none">● editando</span>
      </div>
    </div>
    
    <div class="content">
      <div class="tab-content active" id="tab-preview">
        <div class="preview-area">
          <div class="iframe-wrapper view-desktop" id="iframe-wrapper">
            <div class="preview-empty" id="preview-empty">🖥 A prévia aparecerá aqui</div>
            <iframe id="output-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals" title="Preview"></iframe>
          </div>
        </div>
      </div>
      
      <div class="tab-content" id="tab-code">
        <div class="code-toolbar">
          <button id="copy-btn" onclick="copyCode()" disabled>📋 Copiar</button>
          <button id="download-btn" disabled>⬇ Baixar ZIP</button>
        </div>
        <div class="code-area">
          <div class="code-empty" id="code-empty">Nenhum código gerado</div>
          <pre id="code-output" style="display:none"></pre>
        </div>
      </div>
    </div>
    
    <div class="log-bar">
      <div class="log-header">⬛ Log</div>
      <div id="status-log"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
